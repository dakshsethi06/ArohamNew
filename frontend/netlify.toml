# Netlify configuration file for Aroham project (Base directory context)
[build]
  # The directory containing the build output (relative to the base directory)
  publish = "dist"
  
  # The command to build the project
  command = "npm run build"

# Redirect rules for Single Page Application (SPA) routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
