# Netlify configuration file for Aroham project
[build]
  # The directory containing the frontend code
  base = "Aroham"
  
  # The directory containing the build output
  publish = "dist"
  
  # The command to build the project
  command = "npm run build"

# Redirect rules for Vite React Single Page Application (SPA) routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
